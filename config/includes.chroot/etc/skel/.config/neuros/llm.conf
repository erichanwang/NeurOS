[llm]
model = "mistral"
context_window = 4096
temperature = 0.7

[assistant]
stream = true
confirm_commands = true
max_file_size_kb = 100

[completion]
enabled = true
port = 11434

[context]
# System-wide context for `nn`: active window title, clipboard contents,
# and recently modified files under $HOME. All OFF by default. Enabling
# a source means `nn` reads that local data and includes it in the prompt
# it sends to Ollama on localhost:11434 - it is never sent anywhere else.
# Set any of these to true to opt in.
window_title = false
clipboard = false
recent_files = false
