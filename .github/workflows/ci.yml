name: NeurOS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Build Configuration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x build.sh validate-build.sh
          chmod +x config/hooks/live/*.hook.chroot
          chmod +x config/includes.chroot/usr/local/bin/* 2>/dev/null || true

      - name: Run pre-build validation
        run: bash validate-build.sh

      - name: Run unit tests
        run: |
          python3 tests/test_nn.py -v
          python3 tests/test_autofix.py -v
          python3 tests/test_model.py -v
          python3 tests/test_mcp.py -v

      - name: Check shell script syntax
        run: |
          for f in config/hooks/live/*.hook.chroot; do
            bash -n "$f" && echo "OK: ${f##*/}" || echo "FAIL: ${f##*/}"
          done
          bash -n build.sh && echo "OK: build.sh"
          bash -n validate-build.sh && echo "OK: validate-build.sh"

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check all Python files compile
        run: |
          echo "Checking Python syntax..."
          FAILED=0
          for f in $(find config/includes.chroot/usr/local/bin -type f \
            -exec head -1 {} \; -print | grep -B1 'python3' | grep '^config/' || true); do
            python3 -c "import ast; ast.parse(open('$f').read())" \
              && echo "OK: ${f##*/}" || { echo "FAIL: ${f##*/}"; FAILED=$((FAILED+1)); }
          done
          for f in tests/*.py scripts/*.py; do
            [ -f "$f" ] || continue
            python3 -c "import ast; ast.parse(open('$f').read())" \
              && echo "OK: ${f##*/}" || { echo "FAIL: ${f##*/}"; FAILED=$((FAILED+1)); }
          done
          if [ $FAILED -gt 0 ]; then
            echo "=== $FAILED file(s) have Python syntax errors ==="
            exit 1
          fi
          echo "All Python files pass syntax check"

      - name: Check JSON validity
        run: |
          python3 -c "import json; json.load(open('config/includes.chroot/etc/skel/.continue/config.json'))" && echo "OK: continue config.json"
          python3 -c "import json; json.load(open('config/includes.chroot/etc/skel/.config/Code/User/settings.json'))" && echo "OK: vscode settings.json"

      - name: Check script shebangs
        run: |
          for f in config/hooks/live/*.hook.chroot; do
            head -1 "$f" | grep -q '#!/bin/bash' && echo "OK: ${f##*/}" || echo "BAD: ${f##*/}"
          done

  build-iso:
    name: Build ISO (Structure Check)
    runs-on: ubuntu-24.04
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build

      - name: Verify build structure
        run: |
          echo "Checking build structure..."
          test -d config/hooks/live && echo "OK: hooks present"
          test -d config/includes.chroot && echo "OK: includes present"
          test -d config/package-lists && echo "OK: package lists present"
          test -f build.sh && echo "OK: build.sh present"
          test -f validate-build.sh && echo "OK: validate-build.sh present"
          echo "Structure OK — full ISO build requires 20GB disk (CI runners limited)"

  docker-build:
    name: Docker Container Build
    runs-on: ubuntu-24.04
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t neuros-build . 2>&1 || echo "Docker build skipped (non-critical in CI)"

      - name: Verify Docker image (if built)
        run: |
          if docker image inspect neuros-build >/dev/null 2>&1; then
            docker run --rm neuros-build bash -c "
              echo 'Container verified:'
              python3 --version 2>&1 || echo 'Python: not found'
              echo 'NeurOS tools:' \$(find /usr/local/bin -name 'neuros-*' 2>/dev/null | wc -l)
            "
          else
            echo "Docker image not built — check Dockerfile"
          fi
